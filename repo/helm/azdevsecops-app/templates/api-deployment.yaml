apiVersion: apps/v1
kind: Deployment
metadata:
  name: azdevsecops-app-api
  labels:
    app: azdevsecops-app
    component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: azdevsecops-app
      component: api
  template:
    metadata:
      labels:
        app: azdevsecops-app
        component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn"]
          args: ["api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: {{ .Values.api.containerPort }}
          env:
            - name: APP_NAME
              value: {{ .Values.config.appName | quote }}
            - name: APP_ENV
              value: {{ .Values.config.appEnv | quote }}
            - name: STORAGE_MODE
              value: {{ .Values.config.storageMode | quote }}
            - name: APP_VERSION
              value: {{ .Values.image.tag | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.api.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 20