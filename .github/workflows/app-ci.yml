name: app-ci

on:
  push:
    branches:
      - main
    paths:
      - "repo/app/**"
      - "repo/helm/**"
      - ".github/workflows/app-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "repo/app/**"
      - "repo/helm/**"
      - ".github/workflows/app-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ahmedkhnissi
  IMAGE_NAME: azdevsecops-app
  CHART_NAME: azdevsecops-app
  CHART_PATH: repo/helm/azdevsecops-app

jobs:
  test-build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_REPOSITORY="${REGISTRY}/${IMAGE_OWNER}/${IMAGE_NAME}"
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REPOSITORY}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_REPOSITORY}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r repo/app/requirements.txt

      - name: Run tests
        working-directory: repo/app
        run: |
          pytest tests

      - name: Lint Helm chart
        run: |
          helm lint $CHART_PATH
          helm template azdevsecops-app $CHART_PATH

      - name: Login to GHCR
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.description=Azure DevSecOps demo application" \
            -t "${{ steps.vars.outputs.image_ref }}" \
            -t "${{ steps.vars.outputs.image_latest }}" \
            ./repo/app

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.vars.outputs.image_ref }}
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Push Docker image to GHCR
        if: github.event_name == 'push'
        run: |
          docker push "${{ steps.vars.outputs.image_ref }}"
          docker push "${{ steps.vars.outputs.image_latest }}"

      - name: Login Helm to GHCR
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login $REGISTRY \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Package Helm chart
        if: github.event_name == 'push'
        run: |
          helm package $CHART_PATH \
            --version 0.1.0 \
            --app-version "${{ steps.vars.outputs.image_tag }}"

      - name: Push Helm chart to GHCR as OCI artifact
        if: github.event_name == 'push'
        run: |
          helm push azdevsecops-app-0.1.0.tgz oci://$REGISTRY/$IMAGE_OWNER/charts